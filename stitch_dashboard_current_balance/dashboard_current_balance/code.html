<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#1a2634",
              "surface-tint": "#535f6f",
              "on-tertiary-fixed": "#22005d",
              "on-surface": "#191c1d",
              "on-tertiary-fixed-variant": "#5300cd",
              "on-primary-fixed": "#101c2a",
              "tertiary": "#150040",
              "surface-bright": "#f8f9fa",
              "inverse-surface": "#2e3132",
              "secondary-fixed": "#69ff87",
              "outline": "#75777c",
              "error": "#ba1a1a",
              "surface-dim": "#d9dadb",
              "surface-variant": "#e1e3e4",
              "primary": "#05111e",
              "secondary-container": "#5cfd80",
              "on-secondary-fixed": "#002108",
              "tertiary-fixed-dim": "#cfbdff",
              "secondary-fixed-dim": "#3ce36a",
              "on-error": "#ffffff",
              "surface-container": "#edeeef",
              "primary-fixed-dim": "#bbc7da",
              "surface-container-low": "#f3f4f5",
              "on-surface-variant": "#44474c",
              "on-tertiary-container": "#9973ff",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "inverse-primary": "#bbc7da",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#3c4857",
              "surface-container-high": "#e7e8e9",
              "tertiary-fixed": "#e8ddff",
              "background": "#f8f9fa",
              "secondary": "#006e2a",
              "tertiary-container": "#2d0076",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#00531e",
              "surface-container-lowest": "#ffffff",
              "on-background": "#191c1d",
              "on-primary-container": "#818d9f",
              "primary-fixed": "#d7e3f7",
              "inverse-on-surface": "#f0f1f2",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "on-primary": "#ffffff",
              "outline-variant": "#c4c6cc",
              "on-secondary-container": "#00732c"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .currency { font-family: 'Manrope', sans-serif; }
        .circular-progress {
            background: conic-gradient(#00C853 260deg, transparent 0deg);
            mask: radial-gradient(farthest-side, transparent calc(100% - 16px), #fff 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 16px), #fff 0);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#F8F9FA] dark:bg-slate-950">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-xl mx-auto">
<button class="hover:opacity-80 transition-opacity scale-95 active:transition-all">
<span class="material-symbols-outlined text-[#1A2634] dark:text-slate-100">account_circle</span>
</button>
<div class="text-[#1A2634] dark:text-white font-extrabold text-2xl tracking-tighter">
                Shnekel
            </div>
<button class="hover:opacity-80 transition-opacity scale-95 active:transition-all">
<span class="material-symbols-outlined text-[#1A2634] dark:text-slate-100">notifications</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-32 max-w-xl mx-auto w-full gap-12">
<!-- Sanctuary Hero: Circular Gauge Section -->
<section class="relative w-full flex flex-col items-center">
<div class="relative w-72 h-72 flex items-center justify-center">
<!-- Track -->
<div class="absolute inset-0 rounded-full border-[16px] border-surface-container-highest"></div>
<!-- Progress -->
<div class="absolute inset-0 rounded-full circular-progress rotate-[-130deg]"></div>
<!-- Content Inside Gauge -->
<div class="text-center flex flex-col items-center justify-center z-10">
<span class="text-on-surface-variant font-medium text-sm mb-1">נותר להיום</span>
<div class="flex items-start justify-center gap-1">
<span class="text-primary-container font-extrabold text-6xl tracking-tight currency leading-none">₪148</span>
</div>
</div>
</div>
<!-- Meta Data: Countdown -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-medium text-sm flex items-center gap-2 justify-center">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'opsz' 20;">schedule</span>
                    מתאפס בעוד 8 שעות ו-5 דקות
                </p>
</div>
</section>
<!-- Primary Action -->
<section class="w-full">
<button class="w-full bg-primary-container text-white py-5 rounded-xl font-bold text-lg shadow-[0px_20px_40px_rgba(26,38,52,0.06)] flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">add_circle</span>
                + הוסף הוצאה
            </button>
</section>
<!-- Secondary Actions: Editorial Layout -->
<section class="w-full grid grid-cols-2 gap-4">
<button class="bg-surface-container-low hover:bg-surface-container-high transition-colors p-4 rounded-xl flex flex-col items-center gap-2 border border-transparent">
<div class="w-10 h-10 rounded-lg bg-primary-fixed-dim/30 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">receipt_long</span>
</div>
<span class="font-semibold text-sm text-primary-container">כל ההוצאות</span>
</button>
<button class="bg-surface-container-low hover:bg-surface-container-high transition-colors p-4 rounded-xl flex flex-col items-center gap-2 border border-transparent">
<div class="w-10 h-10 rounded-lg bg-primary-fixed-dim/30 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">leaderboard</span>
</div>
<span class="font-semibold text-sm text-primary-container">דוחות</span>
</button>
</section>
<!-- Editorial Insight / Decorative Component -->
<section class="w-full bg-surface-container-lowest p-6 rounded-xl border border-surface-container-high/50 flex items-center gap-4">
<div class="flex-1">
<h3 class="text-primary-container font-bold text-sm mb-1">טיפ חיסכון</h3>
<p class="text-on-surface-variant text-xs leading-relaxed">הוצאת פחות ב-15% מהממוצע השבועי שלך עד כה. כל הכבוד!</p>
</div>
<div class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#F8F9FA]/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0px_-10px_30px_rgba(26,38,52,0.04)]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-[#00C853] dark:text-[#00C853] font-bold scale-110 transition-transform tap-highlight-none" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] text-[12px] font-medium">דף הבית</span>
</a>
<!-- Add -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-60 hover:text-[#1A2634] dark:hover:text-white transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-['Inter'] text-[12px] font-medium">הוספה</span>
</a>
<!-- Import/Wallet -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-60 hover:text-[#1A2634] dark:hover:text-white transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[12px] font-medium">ייבוא</span>
</a>
<!-- Reports -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-60 hover:text-[#1A2634] dark:hover:text-white transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-['Inter'] text-[12px] font-medium">דוחות</span>
</a>
</nav>
</body></html>
